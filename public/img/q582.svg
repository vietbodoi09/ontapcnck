<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="Segoe UI, sans-serif">
  <rect width="400" height="280" fill="#f8fafc" rx="8"/>
  <text x="200" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Vị trí không gian của mối hàn</text>
  <!-- 4 welding positions -->
  <!-- Flat (0°) -->
  <g transform="translate(70,80)">
    <rect x="0" y="0" width="60" height="8" fill="#94a3b8" stroke="#475569" stroke-width="1"/>
    <line x1="0" y1="8" x2="60" y2="8" stroke="#f59e0b" stroke-width="3"/>
    <text x="30" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">φ = 0°</text>
    <text x="30" y="44" text-anchor="middle" font-size="10" fill="#16a34a">Hàn sấp</text>
  </g>
  <!-- Horizontal (90°) -->
  <g transform="translate(170,60)">
    <rect x="25" y="0" width="8" height="60" fill="#94a3b8" stroke="#475569" stroke-width="1"/>
    <line x1="25" y1="0" x2="25" y2="60" stroke="#f59e0b" stroke-width="3"/>
    <text x="30" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">φ = 90°</text>
    <text x="30" y="94" text-anchor="middle" font-size="10" fill="#2563eb">Hàn ngang</text>
  </g>
  <!-- Overhead (180°) -->
  <g transform="translate(260,80)">
    <rect x="0" y="8" width="60" height="8" fill="#94a3b8" stroke="#475569" stroke-width="1"/>
    <line x1="0" y1="8" x2="60" y2="8" stroke="#f59e0b" stroke-width="3"/>
    <text x="30" y="-4" text-anchor="middle" font-size="10" fill="#64748b">↑ que hàn từ dưới lên</text>
    <text x="30" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">φ = 180°</text>
    <text x="30" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Hàn trần</text>
  </g>
  <!-- Angle diagram -->
  <g transform="translate(200,190)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- 0° -->
    <circle cx="50" cy="0" r="4" fill="#16a34a"/>
    <text x="65" y="4" font-size="9" fill="#16a34a">0°</text>
    <!-- 90° -->
    <circle cx="0" cy="-50" r="4" fill="#2563eb"/>
    <text x="8" y="-48" font-size="9" fill="#2563eb">90°</text>
    <!-- 180° -->
    <circle cx="-50" cy="0" r="4" fill="#dc2626"/>
    <text x="-72" y="4" font-size="9" font-weight="700" fill="#dc2626">180°</text>
  </g>
</svg>
