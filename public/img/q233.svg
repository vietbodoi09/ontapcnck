<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="Segoe UI, sans-serif">
  <rect width="420" height="300" fill="#f8fafc" rx="8"/>
  <text x="210" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Thông số hình học dao tiện</text>
  <!-- Workpiece surface -->
  <rect x="120" y="45" width="270" height="55" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" rx="2"/>
  <text x="255" y="78" text-anchor="middle" font-size="11" fill="#64748b">Phôi</text>
  <!-- Tool body -->
  <polygon points="60,230 170,100 215,100 190,140 140,230" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
  <!-- Main cutting edge -->
  <line x1="170" y1="100" x2="215" y2="100" stroke="#dc2626" stroke-width="2.5"/>
  <!-- Vertical reference line through cutting point -->
  <line x1="185" y1="60" x2="185" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Horizontal reference -->
  <line x1="140" y1="100" x2="250" y2="100" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Angle 1 (α - góc sau) - between flank face and cutting plane -->
  <path d="M 155,155 Q 162,135 175,125" fill="none" stroke="#2563eb" stroke-width="2"/>
  <circle cx="148" cy="142" r="12" fill="#2563eb"/>
  <text x="148" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <!-- Angle 2 (γ - góc trước) - between rake face and normal -->
  <path d="M 192,125 Q 198,112 207,105" fill="none" stroke="#16a34a" stroke-width="2"/>
  <circle cx="210" cy="120" r="12" fill="#16a34a"/>
  <text x="210" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <!-- Angle 3 (φ - góc nghiêng chính) - between main cutting edge and feed direction -->
  <path d="M 240" y1="100" fill="none" stroke="#dc2626" stroke-width="2" d="M 235,100 Q 225,107 218,100"/>
  <circle cx="252" cy="112" r="12" fill="#dc2626"/>
  <text x="252" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <!-- Angle 4 (φ₁ - góc nghiêng phụ) -->
  <circle cx="155" cy="108" r="12" fill="#f59e0b"/>
  <text x="155" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <!-- Feed direction arrow -->
  <line x1="300" y1="100" x2="240" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="240,97 240,103 233,100" fill="#f59e0b"/>
  <text x="270" y="93" text-anchor="middle" font-size="10" fill="#f59e0b">S (chạy dao)</text>
  <!-- Legend -->
  <rect x="15" y="252" width="390" height="38" fill="#eff6ff" rx="6"/>
  <text x="210" y="268" text-anchor="middle" font-size="10" fill="#1e40af">1 = α (góc sau) · 2 = γ (góc trước)</text>
  <text x="210" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">3 = φ (góc nghiêng chính) ← đáp án · 4 = φ₁ (góc nghiêng phụ)</text>
</svg>
